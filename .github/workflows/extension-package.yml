name: Build browser extension

on:
  push:
    branches: [main]
    paths:
      - "apps/extension/**"
      - ".github/workflows/extension-package.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/extension
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Create extension archive
        run: |
          cd dist
          zip -r ../mediabridge-extension.zip .

      - name: Upload extension archive
        uses: actions/upload-artifact@v4
        with:
          name: mediabridge-extension
          path: apps/extension/mediabridge-extension.zip
          if-no-files-found: error

      - name: Publish latest extension release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git push origin HEAD:refs/tags/browser-extension --force
          if gh release view browser-extension >/dev/null 2>&1; then
            gh release upload browser-extension mediabridge-extension.zip --clobber
            gh release edit browser-extension --title "MediaBridge Browser Extension" --prerelease --notes "Latest build from commit $GITHUB_SHA"
          else
            gh release create browser-extension mediabridge-extension.zip --title "MediaBridge Browser Extension" --prerelease --notes "Latest build from commit $GITHUB_SHA"
          fi
